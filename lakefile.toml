name = "stabilizer-barnes-wall"
defaultTargets = ["StabilizerBW"]

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.29.0"

[[lean_lib]]
name = "StabilizerBW"
srcDir = "lean"
# The umbrella aggregator `StabilizerBW.lean` is the single build root; every
# included submodule reaches the build via transitive import from there.
# This lets the library skip the small handful of modules that still have known
# Lean v4.29 tactic regressions while leaving their source on disk for reference.
globs = ["StabilizerBW"]
